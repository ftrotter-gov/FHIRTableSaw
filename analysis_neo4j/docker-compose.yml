version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: fhir_neo4j_analysis
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./import:/var/lib/neo4j/import
    environment:
      # Authentication
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/your_password_here}
      
      # Memory settings
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
      
      # APOC plugin (optional but useful for advanced operations)
      - NEO4J_PLUGINS=["apoc"]
      
      # Allow CSV import from file URLs
      - NEO4J_dbms_security_allow__csv__import__from__file__urls=true
      
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-your_password_here} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
