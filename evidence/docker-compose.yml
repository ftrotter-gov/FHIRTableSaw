# =============================================================================
# Docker Compose for FHIRTableSaw Evidence reports
# =============================================================================
#
# Services:
#   evidence-dev   - Development server with hot-reload (port 3000)
#   evidence-build - One-shot static build for GitHub Pages
#
# PostgreSQL credentials are read from the project root .env file.
# The .env file uses DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_DATABASE
# variables which are mapped to Evidence's EVIDENCE_SOURCE__postgres__*
# environment variables below.
#
# DuckDB .db files can be bind-mounted into sources/duckdb_local/.
#
# Usage:
#   docker compose up evidence-dev         # Start dev server
#   docker compose run evidence-build      # Build static site
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Development server (hot-reload, port 3000)
  # ---------------------------------------------------------------------------
  evidence-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    # Using network_mode: host so the container can reach a local PostgreSQL.
    # The Evidence dev server listens on port 3000.
    # If your PostgreSQL is remote, you can switch to bridge networking and
    # uncomment the ports mapping below instead.
    network_mode: host
    # ports:
    #   - "3000:3000"
    volumes:
      # Mount the Evidence project source for live editing
      - ./pages:/app/pages
      - ./sources:/app/sources
      - ./evidence.config.yaml:/app/evidence.config.yaml
      # Mount DuckDB files from the project root (if they exist)
      # Adjust the host path below to point at your .db files
      # Example: - ../data/fhirtablesaw.duckdb:/app/sources/duckdb_local/fhirtablesaw.duckdb:ro
    environment:
      # PostgreSQL connection credentials for Evidence.
      # Mapped from the project .env variables (DB_HOST, DB_USER, etc.)
      # to Evidence's expected EVIDENCE_SOURCE__postgres__* format.
      # The .env file is loaded via env_file below and is NOT modified.
      - EVIDENCE_SOURCE__postgres__host=${DB_HOST:-localhost}
      - EVIDENCE_SOURCE__postgres__port=${DB_PORT:-5432}
      - EVIDENCE_SOURCE__postgres__database=${DB_DATABASE:-postgres}
      - EVIDENCE_SOURCE__postgres__user=${DB_USER:-postgres}
      - EVIDENCE_SOURCE__postgres__password=${DB_PASSWORD:-postgres}
      - EVIDENCE_SOURCE__postgres__ssl=no-verify
    env_file:
      # Read the project root .env (will NOT be edited or overwritten)
      - path: ../.env
        required: false

  # ---------------------------------------------------------------------------
  # Static build for GitHub Pages (one-shot container)
  # ---------------------------------------------------------------------------
  evidence-build:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    network_mode: host
    volumes:
      # Export the built static site to the host
      - ./build:/app/build
      # Mount sources so the build can read latest queries
      - ./sources:/app/sources
    environment:
      - EVIDENCE_SOURCE__postgres__host=${DB_HOST:-localhost}
      - EVIDENCE_SOURCE__postgres__port=${DB_PORT:-5432}
      - EVIDENCE_SOURCE__postgres__database=${DB_DATABASE:-postgres}
      - EVIDENCE_SOURCE__postgres__user=${DB_USER:-postgres}
      - EVIDENCE_SOURCE__postgres__password=${DB_PASSWORD:-postgres}
      - EVIDENCE_SOURCE__postgres__ssl=no-verify
      - BASE_PATH=/FHIRTableSaw
    env_file:
      - path: ../.env
        required: false
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        npm run sources && \
        npm run build && \
        echo "=== Static build complete. Output in ./build/ ==="
